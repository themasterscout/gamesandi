let skor=0;
let waktu=60;
let current;
let timer;
let kataLevel=[];

// ===== Mulai Level =====
function startLevel(lvl){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("desc").innerText="Tebak sandi Morse!";
    if(lvl===1){
        kataLevel=level1;
        startGame(kataLevel);
    }else{
        alert("Level "+lvl+" masih dalam pengembangan");
    }
}

// ===== Game Morse =====
function acakLevel(){
    return kataLevel[Math.floor(Math.random()*kataLevel.length)];
}

function startGame(levelData){
    tampilSoal();
    startTimer();
}

function tampilSoal(){
    current = acakLevel();
    const soalDiv = document.getElementById("soal");
    soalDiv.innerHTML="";
    current.morse.split(" ").forEach(l=>{
        const span = document.createElement("span");
        span.textContent = l;
        soalDiv.appendChild(span);
    });
    document.getElementById("jawaban").value="";
}

function cekJawaban(){
    const input = document.getElementById("jawaban").value.trim().toUpperCase();
    if(input === current.word.toUpperCase()){
        skor++;
        document.getElementById("skor").innerText=skor;
        waktu +=3;
        document.getElementById("waktu").innerText=waktu;
        document.querySelectorAll("#soal span").forEach(span=>span.classList.add("correct"));
        setTimeout(tampilSoal,500);
    }else{
        document.querySelectorAll("#soal span").forEach(span=>span.classList.add("wrong"));
        document.getElementById("jawaban").value="";
    }
}

function startTimer(){
    timer = setInterval(()=>{
        waktu--;
        document.getElementById("waktu").innerText=waktu;
        if(waktu<=0){
            clearInterval(timer);
            alert("Waktu habis! Skor kamu: "+skor);
            location.reload();
        }
    },1000);
}
